build-and-release:
    needs: test
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: branch_info
        run: |
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          if [[ "$HEAD_REF" == v* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "version=$HEAD_REF" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - if: steps.branch_info.outputs.is_release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - if: steps.branch_info.outputs.is_release == 'true'
        run: |
          GOOS=linux GOARCH=amd64 go build -o mert.downloader-linux-amd64 .
          GOOS=windows GOARCH=amd64 go build -o mert.downloader-windows-amd64.exe .
          GOOS=darwin GOARCH=arm64 go build -o mert.downloader-darwin-arm64 .

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.branch_info.outputs.version }},enable=${{ steps.branch_info.outputs.is_release == 'true' }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - if: steps.branch_info.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.branch_info.outputs.version }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          generate_release_notes: true
          files: |
            mert.downloader-linux-amd64
            mert.downloader-windows-amd64.exe
            mert.downloader-darwin-arm64