<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle inner shadow -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="4"/>
  <!-- Download arrow -->
  <g filter="url(#glow)">
    <!-- Arrow shaft -->
    <rect x="224" y="120" width="64" height="180" rx="32" fill="url(#arrow)"/>
    <!-- Arrow head (chevron) -->
    <path d="M256 380 L160 280 L192 248 L256 312 L320 248 L352 280 Z" fill="url(#arrow)"/>
    <!-- Base line -->
    <rect x="144" y="370" width="224" height="44" rx="22" fill="url(#arrow)"/>
  </g>
</svg>